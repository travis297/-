<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于机器学习的二手车交易价格预测模型研究</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-color: #050b14;
            --panel-bg: rgba(13, 34, 71, 0.4);
            --border-color: #1a498b;
            --text-color: #d1e5ff;
            --highlight: #00f0ff;
            --accent: #ffae00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #0d2247 0%, #050b14 100%);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 头部样式 */
        header {
            height: 80px;
            text-align: center;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="80"><path d="M0,80 L0,0 L100%,0 L100%,80 L80%,80 L75%,40 L25%,40 L20%,80 Z" fill="rgba(13, 34, 71, 0.6)" stroke="%231a498b" stroke-width="2"/></svg>') no-repeat center bottom;
            background-size: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        header h1 {
            font-size: 32px;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 15px var(--highlight);
            margin-top: -15px;
        }

        /* 页面网格布局 */
        .main-container {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
        }

        .col-left, .col-right {
            width: 28%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .col-center {
            width: 44%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            padding: 15px;
            flex: 1;
            box-shadow: inset 0 0 20px rgba(0, 150, 255, 0.1);
        }

        /* 边角装饰 */
        .panel::before, .panel::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border-top: 2px solid var(--highlight);
        }
        .panel::before { top: -1px; left: -1px; border-left: 2px solid var(--highlight); }
        .panel::after { top: -1px; right: -1px; border-right: 2px solid var(--highlight); }
        .panel-bottom-corners::before, .panel-bottom-corners::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border-bottom: 2px solid var(--highlight);
        }
        .panel-bottom-corners::before { bottom: -1px; left: -1px; border-left: 2px solid var(--highlight); }
        .panel-bottom-corners::after { bottom: -1px; right: -1px; border-right: 2px solid var(--highlight); }

        .panel-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--highlight);
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 4px solid var(--highlight);
            display: flex;
            justify-content: space-between;
        }

        .chart-container {
            width: 100%;
            height: calc(100% - 30px);
        }

        /* 中心估价仪样式 */
        .valuation-dashboard {
            display: flex;
            flex-direction: column;
            height: 100%;
            align-items: center;
        }

        .price-display {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            width: 250px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.2);
            position: relative;
        }
        
        /* 呼吸光环动画 */
        .price-display::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px dashed rgba(0, 240, 255, 0.5);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .price-label {
            font-size: 14px;
            color: #8ab4f8;
            margin-bottom: 10px;
        }

        .price-value {
            font-size: 42px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            font-family: 'Courier New', Courier, monospace;
        }

        .price-range {
            font-size: 14px;
            color: #00f0ff;
            margin-top: 10px;
        }

        /* 控制面板 */
        .controls {
            width: 100%;
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-size: 14px;
            margin-bottom: 8px;
            color: #a0c4ff;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--highlight);
        }

        .control-group select, .control-group input[type="number"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }

        .val-text {
            text-align: right;
            font-size: 12px;
            color: var(--highlight);
            margin-top: 5px;
        }

        .stacking-badge {
            background: linear-gradient(90deg, #ffae00, #ff5200);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 10px;
            font-weight: normal;
        }

    </style>
</head>
<body>

    <header>
        <h1>基于机器学习的二手车交易价格预测模型研究</h1>
    </header>

    <div class="main-container">
        <div class="col-left">
            <div class="panel">
                <div class="panel-bottom-corners"></div>
                <div class="panel-title">特征工程链路分析 (Funnel)</div>
                <div id="funnelChart" class="chart-container"></div>
            </div>
            
            <div class="panel">
                <div class="panel-bottom-corners"></div>
                <div class="panel-title">交易市场品牌热力分布</div>
                <div id="brandChart" class="chart-container"></div>
            </div>
        </div>

        <div class="col-center">
            <div class="panel" style="flex: 2;">
                <div class="panel-bottom-corners"></div>
                <div class="panel-title">交互式爱车估价仪 <span class="stacking-badge">Powered by Stacking</span></div>
                
                <div class="valuation-dashboard">
                    <div class="price-display">
                        <div class="price-label">Stacking 实时预测均价</div>
                        <div class="price-value" id="predPrice">¥ 0</div>
                        <div class="price-range" id="predRange">置信区间: ± ¥ 0</div>
                    </div>

                    <div class="controls">
                        <div class="control-group">
                            <label>车辆注册时间 (车龄: <span id="ageVal">5</span> 年)</label>
                            <input type="range" id="ageInput" min="0" max="25" value="5" step="0.5">
                        </div>
                        <div class="control-group">
                            <label>行驶里程 (<span id="mileageVal">8</span> 万公里)</label>
                            <input type="range" id="mileageInput" min="0" max="30" value="8" step="0.5">
                        </div>
                        <div class="control-group">
                            <label>发动机功率 (马力)</label>
                            <input type="number" id="powerInput" value="150" min="50" max="600">
                        </div>
                        <div class="control-group">
                            <label>品牌与车型</label>
                            <select id="brandInput">
                                <option value="BBA">高端品牌 (BBA等)</option>
                                <option value="Joint" selected>主流合资 (大众/丰田等)</option>
                                <option value="Domestic">国产自主 (吉利/长安等)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                 <div class="panel-bottom-corners"></div>
                 <div class="panel-title">Stacking 模型残差跟踪 (Mock)</div>
                 <div id="residualChart" class="chart-container"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="panel">
                <div class="panel-bottom-corners"></div>
                <div class="panel-title">多模型集成 (Stacking) 精度对比</div>
                <div id="maeChart" class="chart-container"></div>
            </div>
            
            <div class="panel">
                <div class="panel-bottom-corners"></div>
                <div class="panel-title">实时特征重要性 (SHAP 透视)</div>
                <div id="importanceChart" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        // ----------------- ECharts 初始化 -----------------
        const funnelChart = echarts.init(document.getElementById('funnelChart'));
        const brandChart = echarts.init(document.getElementById('brandChart'));
        const maeChart = echarts.init(document.getElementById('maeChart'));
        const importanceChart = echarts.init(document.getElementById('importanceChart'));
        const residualChart = echarts.init(document.getElementById('residualChart'));

        // 通用图表配置
        const textStyle = { color: '#a0c4ff' };
        
        // 1. 特征漏斗图配置
        const funnelOption = {
            tooltip: { trigger: 'item', formatter: '{b} : {c}条数据' },
            color: ['#0052d4', '#4364f7', '#6fb1fc', '#00f0ff', '#ffae00'],
            series: [
                {
                    name: '数据链路',
                    type: 'funnel',
                    left: '10%', right: '10%', top: '10%', bottom: '10%',
                    minSize: '0%', maxSize: '100%',
                    sort: 'descending',
                    gap: 2,
                    label: { show: true, position: 'inside', fontSize: 12, color: '#fff' },
                    itemStyle: { borderColor: '#fff', borderWidth: 0 },
                    data: [
                        { value: 150000, name: '1. 原始脏数据接入 (15万)' },
                        { value: 135000, name: '2. 异常值/缺失值清洗' },
                        { value: 100000, name: '3. 匿名特征提取 (v_0~v_14)' },
                        { value: 80000, name: '4. 目标编码与降维分析' },
                        { value: 60000, name: '5. Stacking 核心层输入' }
                    ]
                }
            ]
        };
        funnelChart.setOption(funnelOption);

        // 2. 品牌热力分布图
        const brandOption = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', top: '15%', containLabel: true },
            xAxis: { 
                type: 'value', 
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                axisLabel: { color: textStyle.color }
            },
            yAxis: { 
                type: 'category', 
                data: ['品牌0', '品牌4', '品牌14', '品牌10', '品牌1'],
                axisLabel: { color: textStyle.color }
            },
            series: [{
                name: '交易量热度',
                type: 'bar',
                data: [31480, 16737, 16089, 14249, 13794],
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                        { offset: 0, color: '#00f0ff' },
                        { offset: 1, color: '#0052d4' }
                    ]),
                    borderRadius: [0, 5, 5, 0]
                }
            }]
        };
        brandChart.setOption(brandOption);

        // 3. 模型MAE对比柱状图
        const maeOption = {
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '10%', top: '15%', containLabel: true },
            xAxis: { 
                type: 'category', 
                data: ['MLP', 'XGBoost', 'LightGBM', 'Ridge', 'Stacking'],
                axisLabel: { color: textStyle.color, interval: 0, fontSize: 11 }
            },
            yAxis: { 
                type: 'value', 
                name: 'MAE (越低越好)', 
                nameTextStyle: { color: textStyle.color },
                min: 450,
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                axisLabel: { color: textStyle.color }
            },
            series: [{
                name: '平均绝对误差(MAE)',
                type: 'bar',
                barWidth: '50%',
                data: [
                    { value: 610, itemStyle: { color: '#4364f7' } },
                    { value: 541, itemStyle: { color: '#4364f7' } },
                    { value: 520, itemStyle: { color: '#4364f7' } },
                    { value: 605, itemStyle: { color: '#4364f7' } },
                    // 突出显示Stacking
                    { value: 488.85, itemStyle: { color: '#ffae00' } } 
                ],
                label: { show: true, position: 'top', color: '#fff' }
            }]
        };
        maeChart.setOption(maeOption);

        // 4. SHAP 特征重要性雷达图
        const importanceOption = {
            tooltip: {},
            radar: {
                indicator: [
                    { name: '精确车龄 (Age)', max: 100 },
                    { name: '发动机功率 (Power)', max: 100 },
                    { name: '匿名特征 v_3', max: 100 },
                    { name: '行驶里程 (Mileage)', max: 100 },
                    { name: '品牌目标编码', max: 100 },
                    { name: '匿名特征 v_10', max: 100 }
                ],
                radius: '65%',
                center: ['50%', '55%'],
                splitNumber: 4,
                axisName: { color: '#00f0ff' },
                splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.2)' } },
                splitArea: { areaStyle: { color: ['rgba(0, 240, 255, 0.05)', 'rgba(0, 240, 255, 0.02)'] } },
                axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.2)' } }
            },
            series: [{
                name: '特征贡献度',
                type: 'radar',
                data: [{
                    value: [95, 85, 75, 70, 60, 50],
                    name: '当前车辆特征权重',
                    areaStyle: { color: 'rgba(255, 174, 0, 0.4)' },
                    lineStyle: { color: '#ffae00' },
                    itemStyle: { color: '#ffae00' }
                }]
            }]
        };
        importanceChart.setOption(importanceOption);

        // 5. 残差图 (Mock)
        const residualOption = {
            grid: { left: '5%', right: '5%', bottom: '20%', top: '20%' },
            xAxis: { show: false, type: 'category', data: Array.from({length: 50}, (_, i) => i) },
            yAxis: { show: false, type: 'value' },
            series: [{
                type: 'line',
                smooth: true,
                lineStyle: { width: 0 },
                showSymbol: false,
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(0, 240, 255, 0.8)' },
                        { offset: 1, color: 'rgba(0, 240, 255, 0)' }
                    ])
                },
                data: Array.from({length: 50}, () => Math.random() * 100 + 400)
            }]
        };
        residualChart.setOption(residualOption);


        // ----------------- 估价仪交互逻辑 -----------------
        const ageInput = document.getElementById('ageInput');
        const mileageInput = document.getElementById('mileageInput');
        const powerInput = document.getElementById('powerInput');
        const brandInput = document.getElementById('brandInput');
        
        const ageVal = document.getElementById('ageVal');
        const mileageVal = document.getElementById('mileageVal');
        
        const predPriceEl = document.getElementById('predPrice');
        const predRangeEl = document.getElementById('predRange');

        // 数字滚动动画函数
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // 使用 easeOut 动画
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + easeOut * (end - start));
                obj.innerHTML = '¥ ' + current.toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        let currentPrice = 0;

        function updateValuation() {
            // 获取用户输入
            const age = parseFloat(ageInput.value);
            const mileage = parseFloat(mileageInput.value);
            const power = parseFloat(powerInput.value) || 100;
            const brand = brandInput.value;

            // 更新显示的Label
            ageVal.textContent = age;
            mileageVal.textContent = mileage;

            // 模拟 Stacking 模型的预测公式 (仅用于展示互动效果)
            // 基础价格随时间、里程折旧，随马力增加
            let basePrice = 180000;
            
            // 品牌溢价
            if (brand === 'BBA') basePrice += 100000;
            else if (brand === 'Joint') basePrice += 20000;
            else if (brand === 'Domestic') basePrice -= 20000;

            // 折旧公式
            let calculatedPrice = basePrice * Math.pow(0.88, age) - (mileage * 1200) + (power * 150);
            
            // 确保价格不跌破底价
            if (calculatedPrice < 3000) calculatedPrice = 3000 + Math.random() * 2000;

            // 计算浮动区间 (模拟预测不确定性)
            const range = Math.floor(calculatedPrice * 0.05);
            predRangeEl.textContent = `模型 MAE 误差域: ± ¥ ${range.toLocaleString()}`;

            // 执行数字动画
            animateValue(predPriceEl, currentPrice, calculatedPrice, 800);
            currentPrice = calculatedPrice;

            // 联动：当调节滑动条时，轻微改变右侧雷达图，模拟 SHAP 值的动态变化
            const newRadarData = [
                Math.min(100, 40 + age * 2),       // 车龄变动导致重要性变化
                Math.min(100, 30 + power * 0.2),   // 马力影响
                75 + Math.random()*5,              // v_3 模拟波动
                Math.min(100, 50 + mileage * 1.5), // 里程影响
                brand === 'BBA' ? 90 : 60,         // 品牌编码影响
                50 + Math.random()*10
            ];
            importanceOption.series[0].data[0].value = newRadarData;
            importanceChart.setOption(importanceOption);
        }

        // 绑定事件监听
        ageInput.addEventListener('input', updateValuation);
        mileageInput.addEventListener('input', updateValuation);
        powerInput.addEventListener('change', updateValuation);
        brandInput.addEventListener('change', updateValuation);

        // 初始化触发一次估价
        updateValuation();

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            funnelChart.resize();
            brandChart.resize();
            maeChart.resize();
            importanceChart.resize();
            residualChart.resize();
        });
    </script>
</body>
</html>
